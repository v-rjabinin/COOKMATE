services:
  cookmate-api:
    build:
      context: .
      dockerfile: Dockerfile # Dockerfile.gpu for GPU
    container_name: cookmate-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - CONF_NANO=0.30
      - CONF_SMALL=0.75
      - IOU_NMS=0.45
      - MODEL_DIR=/app/models
    # Для GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
